<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!--CREO TITULO PARA PAGINA -->
    <h1>HOLA ESTE ES MI PRIMER TITULO</h1>
    <!--CREO PRIMER PARRAFO -->
    <p>Mi primer parrafo</p>
    <!--Agrego negrita y cursiva-->
    <p>Este es mi segundo parrafo, <strong>usando negrita</strong></p>
    <p>Este es mi tercer parrafo <em> usando cursiva</em></p>

    <!--Creo una lista NO ordenada con <ul>-->
    <ul>
        <li>Primer elemento de la lista</li>
        <li><strong>Segundo elemento de la lista</strong></li>
        <li>Tercer <em> elemento </em> de la lista </li>
    </ul>

    <!--Creo una lista ordenada con <ol> -->
    <ol>
        <li>Elemento 1 de la lista ordenada</li>
    </ol>
</body>

</html>
